vectordb:
- name: default_vectordb
  collection_name: test_collection_v3
  db_type: chroma
  embedding_batch: 200
  embedding_model: huggingface_all_mpnet_base_v2
  similarity_metric: cosine
  client_type: persistent
  host: localhost
  port: 8000
  ssl: false
  headers: null
  api_key: null
  tenant: default_tenant
  database: default_database
  path: '/home/cz/AUTO_GRADON/experiments/db_resources/db_20250523'
node_lines:
- node_line_name: pre_retrieve_node_line
  nodes:
  - node_type: query_expansion
    strategy:
      metrics:
      - retrieval_precision
      - retrieval_recall
      - retrieval_f1
    modules:
    - batch: 2
      generator_module_type: LlamaIndexLLM
      is_chat_model: true
      llm: openailike
      model: qwen2.5-7b-instruct-1m
      module_type: pass_query_expansion
      temperature: 0.1
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: sk-e46fb251c74d4c64a4c2835333e994a3
      timeout: 1200.0
- node_line_name: retrieve_node_line
  nodes:
  - strategy:
      metrics:
      - retrieval_f1
      - retrieval_recall
      - retrieval_precision
    node_type: retrieval
    modules:
    - module_type: vectordb
      top_k: 5
      embedding_batch: 256
      vectordb: default_vectordb
    - module_type: bm25
      top_k: 5
      bm25_tokenizer: porter_stemmer
    - module_type: hybrid_rrf
      top_k: 5
      target_modules: ('bm25', 'vectordb')
      rrf_k: [3, 5, 10]
- node_line_name: passage_aug_node_line
  nodes:
  - node_type: passage_augmenter
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_recall
      - retrieval_precision
    modules:
    - module_type: pass_passage_augmenter
      top_k: 5
- node_line_name: passage_reranker_node_line
  nodes:
  - node_type: passage_reranker
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_recall
      - retrieval_precision
    modules:
    - module_type: tart
      top_k: 5
      instruction: Find passage to answer given question
- node_line_name: passage_filter_node_line
  nodes:
  - node_type: passage_filter
    strategy:
      metrics:
      - retrieval_f1
      - retrieval_recall
      - retrieval_precision
    modules:
    - module_type: pass_passage_filter
- node_line_name: passage_compressor_node_line
  nodes:
  - node_type: passage_compressor
    strategy:
      metrics:
      - retrieval_token_recall
      - retrieval_token_precision
      - retrieval_token_f1
    modules:
    - module_type: tree_summarize
      is_chat_model: true
      llm: openailike
      model: qwen2.5-7b-instruct-1m
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: sk-e46fb251c74d4c64a4c2835333e994a3
      timeout: 1200.0
- node_line_name: prompt_maker_node_line
  nodes:
  - node_type: prompt_maker
    strategy:
      metrics:
      - meteor
      - rouge
      - bert_score
    modules:
    - module_type: fstring
      prompt: "Tell me something about the question: {query} \n {retrieved_contents}"
- node_line_name: generator_node_line
  nodes:
  - node_type: generator
    strategy:
      metrics:
      - meteor
      - rouge
      - bert_score
    modules:
    - batch: 2
      max_token: 512
      module_type: LlamaIndexLLM
      temperature: 0.1
      is_chat_model: true
      llm: openailike
      model: qwen2.5-7b-instruct-1m
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: sk-e46fb251c74d4c64a4c2835333e994a3
      timeout: 1200.0
strategies:
  metrics:
  - meteor
  - rouge
  - bert_score
bm25_tokenizer_list:
  - porter_stemmer

